<style id="nhd-cockpit-css">
  /* Wrapper around #app. In HUD mode it is transparent to layout. */
  #nhd-cockpit { display: contents; }

  /* ---- SPLIT / COCKPIT MODE ----------------------------------------
     Window splits into [ terminal 2/3 | telemetry 1/3 ]. Telemetry
     restacks to a single scrollable column; the terminal overlay is
     re-parented into the left pane (handled in JS). ----------------- */
  body[data-layout="split"] #nhd-cockpit {
    display: flex; gap: 6px; height: 100vh; width: 100%;
    padding: 6px; box-sizing: border-box; align-items: stretch;
  }

  /* Left pane: SSH terminal, 2/3 width. Strip the floating-overlay
     positioning so it behaves as a normal flex child. */
  body[data-layout="split"] #term-overlay {
    position: static; display: flex; flex: 2 1 0%;
    left: auto; top: auto; right: auto; bottom: auto;
    width: auto; height: auto; min-width: 0; min-height: 0;
    margin: 0; box-shadow: none; resize: none;
  }
  body[data-layout="split"] #term-overlay .term-header { cursor: default; }
  /* CLOSE (last header button) has nowhere to close to when docked. */
  body[data-layout="split"] #term-overlay .term-header .term-btn:last-child { display: none; }

  /* Right pane: telemetry, 1/3 width, single column, scrollable. */
  body[data-layout="split"] #app {
    flex: 1 1 0%; min-width: 0; min-height: 0;
    overflow-y: auto; overflow-x: hidden; padding: 0;
  }
  body[data-layout="split"] #app.shell { min-height: 0; padding: 0; }
  body[data-layout="split"] .grid { grid-template-columns: 1fr; }
  /* Center column carries an inline align-items:center; stretch it full-width. */
  body[data-layout="split"] .grid .col[style] { align-items: stretch !important; }
  /* Keep hostname/status visible while the panels scroll. */
  body[data-layout="split"] .header {
    position: sticky; top: 0; z-index: 5; margin: 0 0 6px;
    padding: 6px 6px 5px; background: var(--bg);
  }
  body[data-layout="split"] .footer { margin-top: 6px; }
  /* The terminal is docked, so the floating launch button is redundant. */
  body[data-layout="split"] .term-fab { display: none; }

  /* Layout toggle button (stacked above the terminal FAB in HUD mode). */
  #nhd-layout-toggle {
    position: fixed; bottom: 78px; right: 20px; z-index: 901;
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--bg2); border: 1.5px solid var(--pri3);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: border-color .3s, box-shadow .3s;
  }
  #nhd-layout-toggle:hover {
    border-color: var(--pri);
    box-shadow: 0 0 12px color-mix(in srgb, var(--pri) 30%, transparent);
  }
  #nhd-layout-toggle svg {
    width: 20px; height: 20px; fill: none; stroke: var(--pri3);
    stroke-width: 1.5; transition: stroke .3s;
  }
  #nhd-layout-toggle:hover svg { stroke: var(--pri); }
  body[data-layout="split"] #nhd-layout-toggle { border-color: var(--pri); bottom: 20px; }
  body[data-layout="split"] #nhd-layout-toggle svg { stroke: var(--pri); }
</style>

<script id="nhd-cockpit-js">
(function () {
  // Terminal object is named `Terminal` (arista) or `TerminalMgr` (others).
  const TERM = window.Terminal || window.TerminalMgr || null;
  const KEY  = 'hud-layout';            // matches the 'hud-theme' persistence style

  function el(id) { return document.getElementById(id); }

  // Wrap #app once so we have a flex parent for the split panes.
  function cockpit() {
    let c = el('nhd-cockpit');
    if (!c) {
      const app = el('app');
      if (!app) return null;
      c = document.createElement('div');
      c.id = 'nhd-cockpit';
      app.parentNode.insertBefore(c, app);
      c.appendChild(app);
    }
    return c;
  }

  function fitSoon() {
    const f = () => { try { if (TERM && TERM._fitAddon && TERM._open) TERM._fitAddon.fit(); } catch (e) {} };
    requestAnimationFrame(f);
    setTimeout(f, 120);
  }

  function apply(mode, userInitiated) {
    mode = (mode === 'split') ? 'split' : 'hud';
    const c = cockpit();
    const overlay = el('term-overlay');
    const app = el('app');
    const fab = el('term-fab');

    document.body.setAttribute('data-layout', mode);
    try { localStorage.setItem(KEY, mode); } catch (e) {}

    if (mode === 'split') {
      // Dock the terminal as the left pane (DOM order => left of #app).
      if (c && overlay && overlay.parentNode !== c) c.insertBefore(overlay, app);
      // Open the terminal so the pane isn't empty. On a cold load with no
      // session yet, only auto-open if the user asked for it (avoids a
      // premature/confusing connect attempt before login).
      const haveSession = !!sessionStorage.getItem('hud_session_id');
      if (TERM && !TERM._open && (userInitiated || haveSession)) {
        try { TERM.open(); } catch (e) {}
      }
      fitSoon();
    } else {
      // Undock: return the overlay to the body as a floating overlay.
      if (TERM && TERM._open) { try { TERM.close(); } catch (e) {} }
      if (overlay && overlay.parentNode !== document.body) {
        document.body.insertBefore(overlay, fab || null);
      }
    }
    syncButton(mode);
  }

  function syncButton(mode) {
    const b = el('nhd-layout-toggle');
    if (b) b.title = (mode === 'split')
      ? 'Switch to HUD layout (Ctrl/Cmd+Shift+L)'
      : 'Switch to cockpit layout — terminal + telemetry (Ctrl/Cmd+Shift+L)';
  }

  const NHD = {
    get() { return document.body.getAttribute('data-layout') || 'hud'; },
    set(mode) { apply(mode, true); },
    toggle() { apply(this.get() === 'split' ? 'hud' : 'split', true); },
  };
  window.nhdLayout = NHD;   // lets the PyQt View menu drive it via runJavaScript

  function makeButton() {
    if (el('nhd-layout-toggle')) return;
    const b = document.createElement('div');
    b.id = 'nhd-layout-toggle';
    b.setAttribute('role', 'button');
    b.setAttribute('aria-label', 'Toggle cockpit layout');
    // Glyph encodes the 2:1 split (divider at x=15 over a 3..21 frame).
    b.innerHTML = '<svg viewBox="0 0 24 24">'
      + '<rect x="3" y="4" width="18" height="16" rx="1"/>'
      + '<line x1="15" y1="4" x2="15" y2="20"/></svg>';
    b.addEventListener('click', () => NHD.toggle());
    document.body.appendChild(b);
  }

  function init() {
    cockpit();
    makeButton();
    let saved = 'hud';
    try { saved = localStorage.getItem(KEY) || 'hud'; } catch (e) {}
    apply(saved, false);   // restore preference without forcing a connect

    window.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'L' || e.key === 'l')) {
        e.preventDefault();
        NHD.toggle();
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
